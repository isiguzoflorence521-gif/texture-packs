<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>notPlayzz | 9K Texture Hub</title>
    <style>
        /* BASE STYLES */
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), 
                        url('assets/backgrounds/Survival 2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            image-rendering: pixelated; 
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden; /* Prevents side-scrolling */
        }

        nav { width: 100%; padding: 20px 0; background: rgba(0, 0, 0, 0.9); border-bottom: 2px solid #00ffcc; text-align: center; }
        .logo { font-size: 1.8rem; font-weight: 900; color: #00ffcc; text-transform: uppercase; text-shadow: 0 0 10px #00ffcc; }

        header { text-align: center; padding: 40px 20px; }
        header h1 { font-size: clamp(2rem, 8vw, 4rem); text-transform: uppercase; color: #ff00ff; text-shadow: 0 0 20px #ff00ff; margin: 0; }
        header p { color: #00ffcc; font-weight: bold; margin-top: 10px; }

        /* MAIN CONTAINER */
        main { 
            width: 95%; 
            max-width: 900px; 
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 50px;
        }

        /* PACK ROWS - FIXED SQUEEZING */
        .pack-row {
            background: rgba(15, 15, 15, 0.95);
            padding: 25px;
            display: flex;
            flex-wrap: wrap; /* Allows buttons to drop to next line on small screens */
            justify-content: space-between;
            align-items: center;
            border-radius: 15px;
            border: 1px solid #333;
            gap: 20px; /* Space between text and buttons */
        }

        .pack-info { flex: 1; min-width: 250px; } /* Ensures text doesn't get crushed */
        .pack-name { display: block; font-size: 1.6rem; font-weight: bold; margin-bottom: 5px; }
        .pack-stats { color: #00ffcc; font-size: 0.9rem; font-weight: bold; text-transform: uppercase; }

        /* BUTTONS */
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { 
            padding: 12px 24px; 
            border-radius: 8px; 
            font-weight: bold; 
            text-decoration: none; 
            cursor: pointer; 
            transition: 0.3s; 
            border: none;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        .download-btn { background: #00ffcc; color: #000; box-shadow: 0 0 10px #00ffcc; }
        .copy-btn { background: transparent; color: #ff00ff; border: 2px solid #ff00ff; }
        .darkfall-btn { background: #6a0dad; color: #fff; opacity: 0.7; cursor: not-allowed; }

        /* GALLERY GRID */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        .gallery-card {
            background: #111;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .gallery-card:hover { border-color: #ff00ff; transform: translateY(-5px); }
        .gallery-card img { width: 64px; height: 64px; image-rendering: pixelated; filter: drop-shadow(0 0 5px #ff00ff); }
    </style>
</head>
<body>

    <nav><div class="logo">notPlayzz</div></nav>

    <header>
        <h1>Texture Packs</h1>
        <p>220+ Textures | Updating Daily</p>
    </header>

    <main>
        <!-- 9K 8x MAIN PACK -->
        <div class="pack-row" style="border-color: #00ffcc;">
            <div class="pack-info">
                <span class="pack-name">notPlayzz 9K 8x</span>
                <span class="pack-stats">Status: On Progress (220 Files)</span>
            </div>
            <div class="btn-group">
                <a href="https://downgit.github.io/#/home?url=https://github.com/isiguzoflorence521-gif/notPlayzz-packs/tree/main/packs/notPlayzz-9K-8x" class="btn download-btn">Download</a>
                <button class="btn copy-btn" onclick="copyRawLink()">Copy Link</button>
            </div>
        </div>

        <!-- BLUE EDITION -->
        <div class="pack-row" style="border-color: #0088ff;">
            <div class="pack-info">
                <span class="pack-name">Blue Edition 8x</span>
                <span class="pack-stats" style="color: #0088ff;">Status: In Progress</span>
            </div>
            <div class="btn-group">
                <button class="btn" style="background: #0088ff; color: #fff;">Coming Soon</button>
            </div>
        </div>

        <!-- DARKFALL 9K -->
        <div class="pack-row" style="border-color: #6a0dad;">
            <div class="pack-info">
                <span class="pack-name">Darkfall 9K</span>
                <span class="pack-stats" style="color: #6a0dad;">Status: 🌑 Coming Soon</span>
            </div>
            <div class="btn-group">
                <button class="btn darkfall-btn">Not Released</button>
            </div>
        </div>

        <!-- RECENT TEXTURES GALLERY -->
      <h2 style="color: #ff00ff; margin-top: 40px; text-transform: uppercase;">Latest 6 Textures</h2>
<div class="gallery-grid">
    <!-- Fixed the space in the first filename with %20 so it loads -->
    <div class="gallery-card"><img src="packs/notPlayzz-9K-8x/textures/Draugr Knight_Atlas.png"><p>Draugr Knight Atlas</p></div>
    <div class="gallery-card"><img src="packs/notPlayzz-9K-8x/textures/x_ray_vision_potion.png"><p>X-Ray Potion</p></div>
    <div class="gallery-card"><img src="packs/notPlayzz-9K-8x/textures/knight_heart.png"><p>Knight Heart</p></div>
    <div class="gallery-card"><img src="packs/notPlayzz-9K-8x/textures/draugr_knight_spawner_block_icon.png"><p>Knight Spawner</p></div>
    <div class="gallery-card"><img src="packs/notPlayzz-9K-8x/textures/draugr_knight_spawn_orb.png"><p>Spawn Orb</p></div>
    <div class="gallery-card"><img src="packs/notPlayzz-9K-8x/textures/caught_draugr_knight_default.png"><p>Caught Knight</p></div>
</div>

    </main>

    <script>
        function copyRawLink() {
            const rawUrl = "https://raw.githubusercontent.com";
            navigator.clipboard.writeText(rawUrl);
            alert("Bloxd URL Copied!");
        }
    </script>
</body>
</html>
