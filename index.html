<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>notPlayzz | Bloxd.io Texture Packs</title>
    <!-- Link to your Neon CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">notPlayzz</div>
    </nav>

    <header>
        <h1>Texture Packs</h1>
        <p>Adding 10 textures every day!</p>
    </header>

    <main>
        <!-- notPlayzz 9K 8x Pack Row -->
        <div class="pack-row">
            <div class="pack-info">
                <span class="pack-name">notPlayzz 9K 8x</span>
                <span class="pack-stats">246 Files • 8x8 Performance</span>
            </div>
            <!-- Raw link for direct loading into Bloxd settings -->
            <button class="download-btn" onclick="copyRawLink()">Copy Link</button>
        </div>

        <!-- Add more rows here as you make more packs -->
    </main>

    <footer>
        <p>© notPlayzz 2024</p>
        <div class="socials">
            <a href="https://github.com">GitHub</a>
        </div>
    </footer>

    <script>
        function copyRawLink() {
            const rawUrl = "https://raw.githubusercontent.com";
            navigator.clipboard.writeText(rawUrl);
            alert("Bloxd link copied! Paste it into 'Custom' settings in-game.");
        }
    </script>
</body>
</html>
